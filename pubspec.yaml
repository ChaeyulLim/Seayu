name: seayu
description: "유기농 농장 작업일지"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Google Sheets
  googleapis: ^13.2.0
  googleapis_auth: ^1.6.0

  # Local DB
  drift: ^2.20.3
  drift_flutter: ^0.2.2
  sqlite3_flutter_libs: ^0.5.0

  # UI
  table_calendar: ^3.1.2

  # Utils
  connectivity_plus: ^6.1.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true
  assets:
    - assets/service_account.json
